# @package _global_
#
# Fusion: Simple Concatenation
#
# Baseline fusion by direct concatenation of embeddings.
# Output dim: 3584 (evo2=2048 + esm3=1536)
#
# Run with:
#   python scripts/run_experiment manylatents fusion/concat

defaults:
  - ../fusion_base

name: fusion_concat

algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: concat
    channels: null  # Use all available
    normalize: false
