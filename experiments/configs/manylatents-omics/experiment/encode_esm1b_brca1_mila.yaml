# @package _global_
# Phase-2 demo: same ESM-1b BRCA1 encode as encode_esm1b_brca1.yaml,
# but dispatched to Mila via Hydra's submitit_slurm launcher.
#
# Untested live as of 2026-05-07 — needs a Mila login session to validate.
# Phase-1 (encode_esm1b_brca1) is the proven path.
#
# Run from the lrw-vep-ub2026 PROJECT ROOT on a Mila login node:
#
#   experiments/tools/manylatents-omics/.venv/bin/python -m manylatents.main \
#       --config-path=$(pwd)/experiments/configs/manylatents-omics \
#       experiment=encode_esm1b_brca1_mila
#
# For other clusters, override at the CLI:
#   experiment=encode_esm1b_brca1_mila cluster=narval launcher=narval_cluster
#
# After the slurm job lands, run the post-step locally:
#   experiments/tools/manylatents-omics/.venv/bin/python \
#       experiments/analysis/00_demo_umap.py --experiment encode_esm1b_brca1_mila

defaults:
  - override /data: clinvar
  - override /algorithms/latent: batch_encoder_esm1b
  - override /metrics: null
  - override /logger: wandb
  - override /cluster: mila
  - override /launcher: mila_cluster
  - _self_

name: encode_esm1b_brca1_mila
project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
seed: 42

data_dir: ${hydra:runtime.cwd}/experiments/tools/manylatents-omics/data

data:
  genes: [BRCA1]
  pathogenicity: all
  max_variants: 200
  batch_size: 32

algorithms:
  latent:
    _recursive_: false
    save_path: ${hydra:runtime.output_dir}/embeddings.pt
    encoder_config:
      device: cuda

logger:
  wandb:
    project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
    entity: ${oc.env:WANDB_ENTITY,cesar-valdez-mcgill-university}
    tags: [workshop, vep, brca1, esm1b, mila]
    job_type: encode

# Slurm overrides — keep modest; ESM-1b 650M on 200 sequences fits comfortably.
# NB: cluster=mila already pins hydra.run.dir to logs/${name}/runs/... — we
# don't pin run.dir here; cluster config takes precedence.
hydra:
  launcher:
    timeout_min: 30
    cpus_per_task: 4
    mem_gb: 32
