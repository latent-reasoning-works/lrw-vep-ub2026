# @package _global_
# Workshop canonical demo: encode top 200 BRCA1 ClinVar missense variants
# with ESM-1b. UMAP + plot + wandb image happens in the follow-up script
# experiments/analysis/00_demo_umap.py.
#
# Resolves the prompt:
#   "Just score the top 200 clinvar missense variants, for BRCA1 or whatever,
#    with esm-1b. plot a umap of the embeddings colored by pathogenic vs
#    benign, run it on the cluster and log to wandb so I can see the thing
#    already"
#
# One-time data prep (BRCA1 missense + protein FASTA):
#   cd experiments/tools/manylatents-omics
#   python3 scripts/download_clinvar.py --gene BRCA1 --max-variants 1000
#
# Then run from experiments/tools/manylatents-omics:
#   .venv/bin/python -m manylatents.main +experiment=encode_esm1b_brca1
# Then from the project root:
#   .venv/bin/python experiments/analysis/00_demo_umap.py

defaults:
  - /config
  - override /data: clinvar
  - override /algorithms/latent: batch_encoder_esm1b
  - override /metrics: null
  - override /logger: wandb
  - _self_

name: encode_esm1b_brca1
project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
seed: 42

data:
  genes: [BRCA1]
  pathogenicity: all     # data module skips VUS even in `all`; gives P/B split
  max_variants: 200
  batch_size: 32

# BatchEncoder writes a .pt with {embeddings, labels, variant_ids} to save_path.
# The follow-up script (00_demo_umap.py) loads from that .pt directly.
algorithms:
  latent:
    save_path: ${paths.output_dir}/embeddings.pt
    encoder_config:
      device: cpu          # override to cuda/mps for GPU runs

logger:
  wandb:
    project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
    entity: ${oc.env:WANDB_ENTITY,cmvcordova}
    tags: [workshop, vep, brca1, esm1b]
    job_type: encode
