# @package _global_
# Workshop canonical demo: encode top 200 BRCA1 ClinVar missense variants
# with ESM-1b. UMAP + plot + wandb image happens in the follow-up script
# experiments/analysis/00_demo_umap.py.
#
# Resolves the prompt:
#   "Just score the top 200 clinvar missense variants, for BRCA1 or whatever,
#    with esm-1b. plot a umap of the embeddings colored by pathogenic vs
#    benign, run it on the cluster and log to wandb so I can see the thing
#    already"
#
# Run from the lrw-vep-ub2026 PROJECT ROOT (the harness pins data_dir and
# hydra.run.dir relative to ${hydra:runtime.cwd}, so cwd matters):
#
#   # one-time: pull BRCA1 missense + protein FASTA (from project root)
#   python3 experiments/tools/manylatents-omics/scripts/download_clinvar.py \
#       --gene BRCA1 --max-variants 1000 \
#       --data-dir experiments/tools/manylatents-omics/data/clinvar
#
#   # encode (Mac users: append `algorithms.latent.encoder_config.device=mps`)
#   experiments/tools/manylatents-omics/.venv/bin/python -m manylatents.main \
#       --config-path=$(pwd)/experiments/configs/manylatents-omics \
#       experiment=encode_esm1b_brca1
#
#   # umap + plot + wandb
#   experiments/tools/manylatents-omics/.venv/bin/python \
#       experiments/analysis/00_demo_umap.py

defaults:
  - override /data: clinvar
  - override /algorithms/latent: batch_encoder_esm1b
  - override /metrics: null
  - override /logger: wandb
  - _self_

name: encode_esm1b_brca1
project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
seed: 42

# Override manylatents' top-level `data_dir` (defaults to `./data`,
# cwd-relative) to point at the workshop repo's pre-bundled ClinVar files
# (see experiments/data/clinvar/README.md). Assumes invocation from the
# lrw-vep-ub2026 project root.
data_dir: ${hydra:runtime.cwd}/experiments/data

data:
  genes: [BRCA1]
  pathogenicity: all     # data module skips VUS even in `all`; gives P/B split
  max_variants: 200
  batch_size: 32

# BatchEncoder writes a .pt with {embeddings, labels, variant_ids} to save_path.
# The follow-up script (00_demo_umap.py) loads from that .pt directly.
# `_recursive_: false` keeps encoder_config as a DictConfig — BatchEncoder
# instantiates the encoder lazily inside `_ensure_encoder_loaded`.
algorithms:
  latent:
    _recursive_: false
    save_path: ${hydra:runtime.output_dir}/embeddings.pt
    encoder_config:
      device: cpu          # Mac override: append `algorithms.latent.encoder_config.device=mps` to the CLI for ~5x speedup

logger:
  wandb:
    project: ${oc.env:WANDB_PROJECT,upper-bound-2026}
    entity: ${oc.env:WANDB_ENTITY,cesar-valdez-mcgill-university}
    tags: [workshop, vep, brca1, esm1b]
    job_type: encode

# Pin Hydra's run dir to a project-relative location so the post-step
# (00_demo_umap.py) can find embeddings.pt via _config.latest_hydra_run.
# Without this, outputs land at <cwd>/outputs/... which the post-step
# only finds if cwd happens to be the submodule (the historical default).
hydra:
  run:
    dir: ${hydra:runtime.cwd}/experiments/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/experiments/outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
