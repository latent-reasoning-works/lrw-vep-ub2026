name: validate

# Runs every validator that fits in a free GitHub-Actions runner.
# What's NOT in CI (and why):
#   - validate.py --full          : regenerates 500-variant cache (~30+ min CPU)
#   - run_first_prompt.py         : 200-variant encode + UMAP (~30 min CPU)
#   - verify_library_vep.py       : needs the manylatents-omics submodule venv
#                                   (fair-esm + extra wheels — different env)
#   - validate_paper.py (default) : requires a Claude Code subagent to produce
#                                   the smoke-test paper before validation
#
# All four of those are runnable manually from a maintainer's machine; the
# pre-PR loop here covers the rest that CI can carry without GPUs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trinity:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (no submodule — notebook validators don't need it)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Cache HuggingFace model weights (ESM-1b ~1.3 GB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-esm1b-${{ runner.os }}
          restore-keys: hf-esm1b-

      - name: Cache tectonic binary (slide-paper compile)
        uses: actions/cache@v4
        with:
          path: ~/.cache/lrw-vep-ub2026
          key: tectonic-${{ runner.os }}

      - name: uv sync (workshop env — root pyproject)
        run: uv sync

      - name: validate.py --quick  (demo-pair LLRs reproduce manifest)
        run: uv run python experiments/notebooks/validate.py --quick

      - name: validate_notebook.py  (15 code cells execute via nbconvert; dumps fallback PNGs)
        run: uv run python experiments/notebooks/validate_notebook.py --save-figures

      - name: validate_paper.py --prepare  (workdir scaffolding sanity)
        run: uv run python experiments/notebooks/validate_paper.py --prepare

      - name: validate_paper.py --real-paper  (paper/main.tex compiles via tectonic)
        run: uv run python experiments/notebooks/validate_paper.py --real-paper --fetch-tectonic

      - name: validate_genes.py --n 5  (TP53/BRCA2/PTEN/MLH1 LLR sign convention)
        # --n 5 (5 P + 5 B per gene) matches the local default. --n 2 is too
        # tight for some genes — at n=2 the head-of-TSV picker for MLH1 lands
        # on weak path / strong benign variants and inverts. n=5 averages
        # over enough variance to surface the real signal on every gene.
        # CPU wall clock ~8-12 min for 4 genes; warm-cache HF download adds
        # 30 s on cold-cache runs.
        run: uv run python experiments/notebooks/validate_genes.py --n 5 --device cpu

      - name: 01_resolution_panels.py  (3-panel resolution figure, ~5 s)
        # Reads pre-computed inputs (demo_pair_scores.json + s3_scores.npz);
        # no encoder calls, fast standalone.
        run: uv run python experiments/analysis/01_resolution_panels.py

      - name: 02_llr_distribution.py  (headline LLR KDE, ~30 s)
        # Reads s3_scores.npz; asserts AUROC against the manifest (within 5e-4).
        run: uv run python experiments/analysis/02_llr_distribution.py

      - name: Upload fallback figure bundle
        # Downloadable from the Actions tab on any green run. Pair this with
        # paper/main.pdf for a complete "if the live demo fails, I have
        # everything I need on disk" bundle.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fallback-figures
          path: |
            experiments/analysis/figures/
            paper/main.pdf
          if-no-files-found: warn
          retention-days: 30
